<html>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Georgia, serif;
    background-color: #4e2015;
  }

  h2 {
    text-align: center;
    padding: 30px 0 20px;
    font-size: 2em;
    color: #4e1d08fb;
    letter-spacing: 2px;
  }

  .row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 16px;
    padding: 20px 40px 40px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .column {
    flex: 0 0 calc(33.33% - 16px);
    max-width: calc(33.33% - 16px);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  @media (max-width: 900px) {
    .column { flex: 0 0 calc(50% - 16px); max-width: calc(50% - 16px); }
  }
  @media (max-width: 500px) {
    .column { flex: 0 0 100%; max-width: 100%; }
  }

  .column img,
  .column video {
    width: 100%;
    height: 180px;
    object-fit: cover;
    display: block;
    border-radius: 6px;
    transition: 0.3s;
  }

  .modal {
    display: none;
    position: fixed;
    z-index: 1;
    padding-top: 60px;
    left: 0; top: 0;
    width: 100%; height: 100%;
    overflow: auto;
    background-color: rgb(65, 39, 19);
  }

  .modal-content {
    position: relative;
    background-color: #ceb297e9;
    margin: auto;
    padding: 0;
    width: 90%;
    max-width: 1200px;
  }

  .close {
    color: rgb(68, 45, 31);
    position: absolute;
    top: 10px;
    right: 25px;
    font-size: 35px;
    font-weight: bold;
    z-index: 10;
  }
  .close:hover { color: #f2a0a0; cursor: pointer; }

  .prev, .next {
    cursor: pointer;
    position: absolute;
    top: 50%;
    width: auto;
    padding: 16px;
    margin-top: -50px;
    color: rgb(234, 231, 231);
    font-weight: bold;
    font-size: 20px;
    transition: 0.6s ease;
    border-radius: 0 3px 3px 0;
    user-select: none;
    -webkit-user-select: none;
  }
  .next { right: 0; border-radius: 3px 0 0 3px; }
  .prev:hover, .next:hover { background-color: rgba(74, 12, 12, 0.8); }

  .numbertext {
    color: #141111;
    font-size: 12px;
    padding: 8px 12px;
    position: absolute;
    top: 0;
  }

  img { margin-bottom: -4px; }

  .caption-container {
    text-align: center;
    background-color: rgb(173, 156, 131);
    padding: 2px 16px;
    color: rgb(18, 10, 1);
  }

  .demo { opacity: 0.6; }
  .active, .demo:hover { opacity: 1; }

  .cursor { cursor: pointer; }

  img.hover-shadow, video.hover-shadow { transition: 0.3s; }
  .hover-shadow:hover {
    box-shadow: 0 4px 8px 0 rgba(58,33,7,0.925), 0 6px 20px 0 rgba(70, 40, 40, 0.906);
    transform: scale(1.03);
  }

  .mySlides img,
  .mySlides video {
    width: 100%;
    height: auto;
    max-height: 75vh;
    object-fit: contain;
  }
</style>

<script>
  function openModal() {
    document.getElementById("myModal").style.display = "block";
  }

  function closeModal() {
    document.getElementById("myModal").style.display = "none";
  }

  var slideIndex = 1;
  showSlides(slideIndex);

  function plusSlides(n) {
    showSlides(slideIndex += n);
  }

  function currentSlide(n) {
    showSlides(slideIndex = n);
  }

  function showSlides(n) {
    var i;
    var slides = document.getElementsByClassName("mySlides");
    var dots = document.getElementsByClassName("demo");
    var captionText = document.getElementById("caption");
    if (n > slides.length) { slideIndex = 1 }
    if (n < 1) { slideIndex = slides.length }
    for (i = 0; i < slides.length; i++) {
      slides[i].style.display = "none";
    }
    for (i = 0; i < dots.length; i++) {
      dots[i].className = dots[i].className.replace(" active", "");
    }
    slides[slideIndex - 1].style.display = "block";
    dots[slideIndex - 1].className += " active";
    captionText.innerHTML = dots[slideIndex - 1].alt|| dots [slideIndex-1].getAttribute("data-alt");
  }
</script>
